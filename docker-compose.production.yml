# Atlas — Production (pre-built image from GitHub Container Registry)
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.production.yml up -d
#   3. Open http://localhost:3001 and complete setup
#
# To pin a specific version instead of latest:
#   IMAGE_TAG=v1.0.0 docker compose -f docker-compose.production.yml up -d

services:
  atlas:
    image: ghcr.io/gorkem-bwl/atlas:${IMAGE_TAG:-latest}
    container_name: atlas
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://atlas:${POSTGRES_PASSWORD:-atlas}@postgres:5432/atlas
      REDIS_URL: redis://redis:6379
      CLIENT_PUBLIC_URL: ${CLIENT_PUBLIC_URL:-http://localhost:3001}
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
    volumes:
      - atlas-uploads:/app/packages/server/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
    volumes:
      - atlas-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    volumes:
      - atlas-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  atlas-uploads:
  atlas-pg-data:
  atlas-redis-data:
